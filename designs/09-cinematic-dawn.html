<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Innovation Hub · Cinematic Dawn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Heebo:wght@300;500;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#FBF6EC;
    --dim:#D2C9B2;
    --night:#0A0B2D;
    --indigo:#21215B;
    --violet:#5C2F9A;
    --magenta:#B53E94;
    --orange:#F26B3B;
    --amber:#F2B544;
    --cream:#FBE6BA;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Heebo','Fraunces',system-ui,sans-serif;color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased;background:#000}

  /* sky -> dawn gradient */
  .sky{position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 70% 80% at 50% 110%, var(--amber) 0%, var(--orange) 18%, var(--magenta) 38%, var(--violet) 60%, var(--indigo) 80%, var(--night) 100%);
  }
  .sky::before{content:"";position:absolute;inset:0;background-image:radial-gradient(1px 1px at 12% 14%,#fff,transparent),radial-gradient(1px 1px at 28% 22%,#fff,transparent),radial-gradient(1.5px 1.5px at 65% 8%,#fff,transparent),radial-gradient(1px 1px at 78% 18%,#fff,transparent),radial-gradient(1px 1px at 45% 6%,#fff,transparent),radial-gradient(1.5px 1.5px at 90% 12%,#fff,transparent);opacity:.7;mask-image:linear-gradient(180deg,#000 0%,transparent 40%)}
  .glow{position:fixed;left:50%;bottom:-20vh;transform:translateX(-50%);width:140vmin;height:140vmin;border-radius:50%;
    background:radial-gradient(circle,var(--cream) 0%,var(--amber) 22%,var(--orange) 38%,rgba(245,107,59,0) 65%);
    filter:blur(20px);z-index:1;animation:dawn 8s ease-in-out infinite;opacity:.9}
  @keyframes dawn{0%,100%{transform:translateX(-50%) translateY(0) scale(1)}50%{transform:translateX(-50%) translateY(-4vh) scale(1.04)}}
  .haze{position:fixed;inset:0;z-index:2;pointer-events:none;background:linear-gradient(180deg,transparent 0%, transparent 50%, rgba(10,11,45,.55) 100%)}
  .vign{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center, transparent 50%, rgba(10,11,45,.35) 100%)}

  /* film grain */
  .grain{position:fixed;inset:0;z-index:30;pointer-events:none;opacity:.10;mix-blend-mode:overlay;
    background-image:radial-gradient(circle at 1px 1px,#fff 1px,transparent 0);background-size:3px 3px}

  /* horizon mountains silhouette */
  .silh{position:fixed;left:0;right:0;bottom:0;height:32vh;z-index:4;pointer-events:none}
  .silh svg{width:100%;height:100%;display:block;filter:drop-shadow(0 -10px 30px rgba(10,11,45,.5))}

  /* nav */
  .nav{position:fixed;top:18px;left:18px;right:18px;z-index:50;height:54px;display:flex;align-items:center;padding:0 22px;gap:18px;border-radius:999px;
    background:rgba(10,11,45,.35);border:1px solid rgba(251,246,236,.18);backdrop-filter:blur(20px) saturate(140%);
    color:var(--ink);box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Fraunces';font-weight:700;font-size:17px;letter-spacing:.3px}
  .brand img{height:30px;filter:drop-shadow(0 4px 12px rgba(242,107,59,.5))}
  .links{display:flex;gap:22px;margin-inline-start:auto;font-size:14px;font-family:'Heebo';font-weight:500;color:var(--dim)}
  .links a{color:inherit;text-decoration:none}
  .links a:hover{color:var(--ink)}
  .tools{display:flex;gap:8px}
  .ic{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(251,246,236,.18);color:var(--ink);display:grid;place-items:center;cursor:pointer}
  .lang{height:36px;padding:0 16px;border-radius:999px;background:var(--amber);color:var(--night);border:0;font-family:'Fraunces';font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer}

  /* hero */
  main{position:relative;z-index:10;height:100vh;display:grid;place-items:center;text-align:center;padding:110px 6vw 0}
  .kicker{font-family:'Heebo';font-size:12px;letter-spacing:6px;text-transform:uppercase;color:var(--amber);font-weight:600;display:inline-flex;align-items:center;gap:14px}
  .kicker::before,.kicker::after{content:"";width:34px;height:1px;background:linear-gradient(90deg,transparent,var(--amber))}
  h1{font-family:'Fraunces';font-weight:900;font-size:clamp(54px,8.5vw,140px);line-height:.95;letter-spacing:-.02em;margin:18px 0 14px}
  h1 em{font-style:italic;font-weight:400;color:var(--cream)}
  h1 .glw{
    background:linear-gradient(180deg,#FFF,var(--amber) 70%, var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 40px rgba(242,181,68,.25)
  }
  .slog{font-family:'Heebo';font-size:13px;font-weight:600;letter-spacing:6px;text-transform:uppercase;color:var(--cream);margin:18px 0 8px}
  .lead{max-width:680px;margin:14px auto 30px;font-family:'Fraunces';font-style:italic;font-size:20px;line-height:1.6;color:var(--dim);font-weight:400}
  .ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .pri{padding:16px 30px;border:0;border-radius:999px;background:var(--amber);color:var(--night);font-family:'Heebo';font-weight:800;font-size:15px;cursor:pointer;
    box-shadow:0 22px 60px -10px rgba(242,181,68,.45)}
  .pri:hover{transform:translateY(-2px);transition:.15s}
  .gho{padding:16px 26px;border-radius:999px;border:1px solid rgba(251,246,236,.35);background:rgba(255,255,255,.05);color:var(--ink);font-family:'Heebo';font-weight:500;cursor:pointer;backdrop-filter:blur(8px)}

  /* sun logo */
  .sun-logo{position:fixed;left:50%;bottom:8vh;transform:translateX(-50%);width:min(240px,28vmin);z-index:6;opacity:.95;filter:drop-shadow(0 0 50px rgba(242,107,59,.55));animation:rise 9s ease-in-out infinite}
  @keyframes rise{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

  .foot{position:fixed;left:0;right:0;bottom:14px;z-index:25;display:flex;justify-content:space-between;padding:0 32px;font-family:'Heebo';font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}

  @media (max-width:900px){.links{display:none}.sun-logo{width:180px;bottom:5vh}}
</style>
</head>
<body>
  <div class="sky"></div>
  <div class="glow"></div>
  <div class="haze"></div>
  <div class="vign"></div>

  <div class="silh">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path d="M0,260 L60,240 L120,255 L200,200 L280,235 L360,180 L450,220 L540,170 L640,210 L740,160 L840,200 L940,150 L1040,195 L1140,165 L1240,210 L1340,175 L1440,205 L1440,320 L0,320 Z" fill="#0A0B2D"/>
    </svg>
  </div>

  <nav class="nav">
    <div class="brand"><img src="../assets/Up_00024_-no-bg-1956x2226 (1).png" alt="">Innovation Hub</div>
    <div class="links">
      <a>אודות</a><a>תוכניות</a><a>צוות</a><a>אירועים</a><a>עדכונים</a><a>אקוסיסטם</a>
    </div>
    <div class="tools">
      <button class="ic" aria-label="נגישות"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="4" r="2"/><path d="M19 13l-5-1v9M5 13l5-1M9 22V15M15 22l-1-7"/></svg></button>
      <button class="lang">EN</button>
    </div>
  </nav>

  <main>
    <div>
      <span class="kicker">A NEW DAWN OF RESILIENCE</span>
      <h1>מ<em>טראומה</em><br>אל <span class="glw">הזדמנות</span>.</h1>
      <div class="slog">From Trauma to Opportunity</div>
      <p class="lead">כשאחרי הלילה הארוך מתחיל אור — אנחנו בונים את התשתית שעוזרת לאנושות לקום, לרפא וליצור חדש.</p>
      <div class="ctas">
        <button class="pri">Join the rising →</button>
        <button class="gho">▶ סרטון תדמית</button>
      </div>
    </div>
  </main>

  <img class="sun-logo" src="../assets/Up_00024_-no-bg-1956x2226 (1).png" alt="">

  <div class="grain"></div>
  <div class="foot"><span>© 2026 Innovation Hub</span><span>v.09 · Cinematic Dawn</span></div>
</body>
</html>
