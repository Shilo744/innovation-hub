<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Innovation Hub · Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
:root{
  --paper-2:#F4F7FA;
  --ink:#FFFFFF;--ink-dark:#0D2436;--ink-mid:#3F546A;
  --teal:#46C9C2;--teal-2:#5EE0D5;--teal-deep:#287E78;--gold:#F2C94C;
  --rule:rgba(13,36,54,.10);--pad:6vw;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--paper-2);color:var(--ink-dark);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
body.fs-lg{font-size:18px}body.fs-xl{font-size:20px}
body.hc{filter:contrast(1.12) saturate(1.15)}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}
.reveal{opacity:0;transform:translateY(26px) scale(.985);transition:opacity .8s ease, transform .8s cubic-bezier(.16,.84,.28,1)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.1s}
section{position:relative;padding:96px var(--pad)}
.section-head{max-width:1240px;margin:0 auto 56px;display:grid;grid-template-columns:auto 1fr;gap:36px;align-items:end}
.section-head .left{max-width:640px}
.section-head .right{align-self:end;font-size:15.5px;line-height:1.7;max-width:440px;color:var(--ink-mid)}
.eyebrow{font-size:11.5px;letter-spacing:4.5px;text-transform:uppercase;font-weight:800;margin-bottom:16px;display:inline-flex;align-items:center;gap:10px;color:var(--teal-deep)}
.eyebrow::before{content:"";width:28px;height:1px;background:currentColor;opacity:.7}
h2.headline{font-family:'Manrope';font-weight:800;font-size:clamp(32px,3.8vw,52px);line-height:1.05;letter-spacing:-.02em}
h2.headline .accent{color:var(--teal-deep)}

.events{background:linear-gradient(180deg, var(--paper-2) 0%, #E9EFF4 100%);overflow:hidden;position:relative}
.events::before{content:"";position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle, rgba(70,201,194,.12), transparent 65%);pointer-events:none}
.events::after{content:"";position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle, rgba(242,201,76,.10), transparent 65%);pointer-events:none}
.events-tabs{position:relative;z-index:2;display:flex;gap:6px;background:#fff;border:1px solid var(--rule);border-radius:999px;padding:6px;width:fit-content;margin:0 auto 50px;box-shadow:0 10px 24px -14px rgba(13,36,54,.18)}
.events-tab{position:relative;z-index:2;padding:11px 28px;border-radius:999px;background:transparent;color:var(--ink-mid);font-size:12.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:color .25s}
.events-tab.active{color:#fff}
.ev-pill{position:absolute;top:6px;bottom:6px;border-radius:999px;background:var(--ink-dark);transition:left .3s cubic-bezier(.2,.7,.2,1),width .3s cubic-bezier(.2,.7,.2,1);z-index:1;left:6px;width:0}
.events-grid{position:relative;z-index:2;display:flex;flex-direction:column;gap:18px;max-width:1240px;margin:0 auto}
.event{display:grid;grid-template-columns:200px 1fr auto;gap:32px;align-items:center;background:#fff;border:1px solid var(--rule);border-radius:var(--radius);padding:26px 30px;cursor:pointer;transition:.3s;position:relative;overflow:hidden}
.event:hover{transform:translateX(-6px);border-color:var(--teal);box-shadow:0 30px 50px -25px rgba(13,36,54,.20)}
.event::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--teal);transform:scaleY(0);transform-origin:bottom;transition:transform .25s}
.event:hover::before{transform:scaleY(1);transform-origin:top}
.event .date-block{display:flex;flex-direction:column;gap:4px;border-right:1px solid var(--rule);padding-right:24px}
.event .day{font-family:'Manrope';font-weight:800;font-size:46px;color:var(--ink-dark);letter-spacing:-.03em;line-height:1}
.event .month-year{font-size:12.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-mid);font-weight:700;margin-top:6px}
.event .pill{margin-top:10px;display:inline-flex;align-items:center;gap:6px;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal-deep);background:rgba(70,201,194,.12);border:1px solid rgba(40,126,120,.25);padding:4px 10px;border-radius:6px;font-weight:700;width:fit-content}
.event .body h3{font-family:'Manrope';font-weight:800;font-size:22px;line-height:1.2;letter-spacing:-.012em;color:var(--ink-dark)}
.event .body p{margin-top:8px;color:var(--ink-mid);font-size:14.5px;line-height:1.6;max-width:560px}
.event .body .meta{margin-top:10px;display:flex;gap:14px;font-size:12.5px;color:var(--ink-mid);font-weight:600}
.event .body .meta span{display:inline-flex;align-items:center;gap:6px}
.event .body .meta svg{opacity:.6}
.event .arrow{width:50px;height:50px;border-radius:50%;background:var(--paper-2);display:grid;place-items:center;color:var(--ink-dark);transition:.3s;flex-shrink:0}
.event:hover .arrow{background:var(--ink-dark);color:#fff;transform:rotate(-12deg)}
@media (max-width:900px){
  .section-head{grid-template-columns:1fr}
  .event{grid-template-columns:1fr;gap:18px}
  .event .date-block{border-right:0;border-bottom:1px solid var(--rule);padding-right:0;padding-bottom:16px;flex-direction:row;align-items:center;gap:18px}
  .event .day{font-size:36px}
  .event .arrow{display:none}
}
@media (max-width:600px){section{padding:80px 6vw}}
</style>
</head>
<body>
<section class="events" id="events">
  <div class="section-head">
    <div class="left">
      <div class="eyebrow">Events</div>
      <h2 class="headline reveal">Where the <span class="accent">community gathers.</span></h2>
    </div>
    <div class="right reveal d1">Conferences, summits and field events that bring together the global resilience innovation ecosystem.</div>
  </div>
  <div class="events-tabs" role="tablist">
    <span class="ev-pill" id="evPill"></span>
    <button class="events-tab active" data-evt="upcoming">Upcoming</button>
    <button class="events-tab" data-evt="recent">Recent</button>
  </div>
  <div class="events-grid" id="eventsGrid"></div>
</section>

<script>
const EVENTS = {
  upcoming:[
    {day:'18',monthYear:'JUN 2026',pill:'Summit',city:'Tel Aviv · Hilton',title:'Resilience Innovation Summit 2026',desc:'Three days of programming with global founders, clinicians and partners — keynotes, workshops, demo day.'},
    {day:'22',monthYear:'SEP 2026',pill:'Demo Day',city:'Boston · Innovation Wing',title:'Boston Cohort · Demo Day',desc:'The second Boston cohort presents pilot results to investors and strategic partners.'},
    {day:'05',monthYear:'NOV 2026',pill:'Community',city:'Sderot · Innovation Center',title:'שיבא לשדרות · Community Day',desc:'A day of co-creation with the Sderot community and local entrepreneurs.'},
  ],
  recent:[
    {day:'19',monthYear:'MAR 2026',pill:'Forum',     city:'Tel Aviv',title:'From Investors to Engines of Creation — Avner Halperin Takeaways',desc:'Highlights and reflections from the spring leadership forum.'},
    {day:'22',monthYear:'FEB 2026',pill:'Milestone', city:'Boston',  title:'Starget Pharma raises $18M Series B',desc:'A portfolio milestone for one of our flagship startups.'},
    {day:'10',monthYear:'JAN 2026',pill:'Roundtable',city:'Geneva',  title:'WHO Resilience Roundtable',desc:'Closed-door session on global resilience policy frameworks.'},
  ],
};
(function(){
  const grid=document.getElementById('eventsGrid');
  function render(key){
    grid.innerHTML=EVENTS[key].map(e=>`
      <article class="event" style="opacity:0;transform:translateY(20px)">
        <div class="date-block">
          <div class="day">${e.day}</div>
          <div class="month-year">${e.monthYear}</div>
          <span class="pill">${e.pill}</span>
        </div>
        <div class="body">
          <h3>${e.title}</h3>
          <p>${e.desc}</p>
          <div class="meta">
            <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-7.5-7-12a7 7 0 0114 0c0 4.5-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>${e.city}</span>
          </div>
        </div>
        <div class="arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      </article>`).join('');
    requestAnimationFrame(()=>{
      grid.querySelectorAll('.event').forEach((el,i)=>{
        setTimeout(()=>{
          el.style.opacity=1;el.style.transform='translateX(0)';
          el.style.transition='opacity .5s ease, transform .4s cubic-bezier(.2,.7,.2,1), border-color .3s, box-shadow .3s';
          if(window.__frameReport) window.__frameReport();
        },i*70);
      });
    });
  }
  function positionPill(){
    const active=document.querySelector('.events-tab.active');
    const pill=document.getElementById('evPill');
    if(active&&pill){pill.style.left=active.offsetLeft+'px';pill.style.width=active.offsetWidth+'px';}
  }
  document.querySelectorAll('.events-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.events-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');positionPill();render(t.dataset.evt);
  }));
  render('upcoming');
  requestAnimationFrame(positionPill);
  addEventListener('resize',positionPill);
})();
</script>
<script src="_bridge.js" data-frame="events"></script>
</body>
</html>
