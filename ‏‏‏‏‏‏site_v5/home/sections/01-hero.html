<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Innovation Hub · Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#051221;--bg-1:#0a1c2e;--bg-2:#112c47;--bg-3:#1c446c;
  --paper:#FFFFFF;--paper-2:#F4F7FA;
  --ink:#FFFFFF;--ink-2:#D6E2EE;--dim:#9AB1C7;--dim-2:#6B859A;--ink-dark:#0D2436;--ink-mid:#3F546A;
  --teal:#0074B5;--teal-2:#38B6FF;--teal-deep:#00588B;
  --gold:#A6ECFF;--gold-2:#A6ECFF;--violet:#8A5BFF;
  --line:rgba(180,210,225,.13);--rule:rgba(13,36,54,.10);--pad:6vw;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--bg-0);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
body.fs-lg{font-size:18px}body.fs-xl{font-size:20px}
body.hc{filter:contrast(1.12) saturate(1.15)}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}

.btn-primary{height:50px;padding:0 26px;border-radius:999px;background:linear-gradient(135deg, var(--teal) 0%, #00588B 100%);color:#fff;font-weight:700;font-size:14.5px;letter-spacing:.2px;transition:.3s cubic-bezier(0.16, 1, 0.3, 1);box-shadow:0 10px 25px -8px rgba(0,116,181,.5);display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:linear-gradient(135deg, var(--teal-2) 0%, var(--teal) 100%);color:#fff;box-shadow:0 15px 30px -8px rgba(56,182,255,.6);transform:translateY(-2px)}
.btn-ghost{height:50px;padding:0 20px;border-radius:999px;background:transparent;color:var(--ink);border:1px solid var(--line);font-weight:600;font-size:13.5px;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.btn-ghost:hover{border-color:rgba(56,182,255,.45);color:var(--teal-2)}

@keyframes hero-in{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.hero-copy > *{opacity:0;animation:hero-in .9s cubic-bezier(.16,.84,.28,1) forwards}
.hero-copy > *:nth-child(1){animation-delay:.15s}
.hero-copy > *:nth-child(2){animation-delay:.28s}
.hero-copy > *:nth-child(3){animation-delay:.40s}
.hero-copy > *:nth-child(4){animation-delay:.50s}
.hero-copy > *:nth-child(5){animation-delay:.60s}
.hero-visual{opacity:0;animation:hero-in 1.1s cubic-bezier(.16,.84,.28,1) .35s forwards}

.hero{position:relative;height:100vh;min-height:680px;overflow:hidden;background:radial-gradient(900px 700px at 78% 50%, var(--bg-2) 0%, var(--bg-1) 35%, var(--bg-0) 80%),radial-gradient(600px 500px at 18% 92%, rgba(31,93,160,.20), transparent 60%),var(--bg-0)}
.hero::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1px 1px at 18% 22%, var(--gold), transparent),radial-gradient(1px 1px at 32% 70%, var(--gold), transparent),radial-gradient(1px 1px at 88% 28%, var(--gold), transparent),radial-gradient(1px 1px at 65% 85%, var(--gold), transparent),radial-gradient(1.5px 1.5px at 78% 62%, #fff, transparent),radial-gradient(1px 1px at 12% 88%, var(--gold), transparent),radial-gradient(1px 1px at 92% 76%, #fff, transparent),radial-gradient(1px 1px at 8% 45%, var(--teal-2), transparent);opacity:.6}
.hero-grid{position:relative;z-index:5;height:100%;display:grid;grid-template-columns:1.05fr .95fr;align-items:center;padding:100px var(--pad) 60px;gap:30px}
.hero-copy{max-width:580px}
.hero .slogan{font-size:11.5px;letter-spacing:4.5px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:14px;display:inline-flex;align-items:center;gap:10px}
.hero .slogan::after{content:"";width:34px;height:1px;background:var(--gold);opacity:.7}
.hero h1{font-family:'Manrope';font-weight:800;font-size:clamp(34px,4.2vw,60px);line-height:1.05;letter-spacing:-.02em}
.hero h1 .b{color:var(--teal-2)}
.hero .lead{margin-top:18px;color:var(--ink-2);font-size:15.5px;line-height:1.65;max-width:480px}
.hero .lead + .lead{margin-top:10px;color:var(--dim);font-size:14.5px}
.hero .cta-row{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap}
.hero-meta{position:absolute;left:var(--pad);bottom:30px;z-index:6;display:flex;gap:34px;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim)}
.hero-meta strong{display:block;font-family:'Manrope';font-weight:800;font-size:22px;color:var(--ink);letter-spacing:-.01em;text-transform:none;margin-bottom:2px}
.hero-meta strong em{font-style:normal;color:var(--teal-2)}
.hero-visual{position:relative;height:100%;display:grid;place-items:center}
.globe-stage{position:relative;width:min(540px,37vw);aspect-ratio:1;filter:drop-shadow(0 30px 70px rgba(31,93,160,.4))}
.globe-stage::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:62%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle, rgba(31,93,160,.45), rgba(138,91,255,.18) 45%, transparent 70%);filter:blur(22px);animation:hero-halo 5s ease-in-out infinite;z-index:1}
@keyframes hero-halo{0%,100%{opacity:.85}50%{opacity:1}}
.globe-svg{position:relative;z-index:2;width:100%;height:100%}
.globe-spin{transform-origin:200px 200px;transform-box:view-box;animation:globe-spin 110s linear infinite}
@keyframes globe-spin{to{transform:rotate(360deg)}}
.globe-logo{opacity:.96;filter:drop-shadow(0 10px 26px rgba(0,0,0,.45))}
.orbit-sat{animation:tw 3.2s ease-in-out infinite;transform-origin:center}
.spark{position:absolute;border-radius:50%;background:#fff;box-shadow:0 0 12px #fff;animation:tw 2.4s ease-in-out infinite;z-index:3}
.s1{width:5px;height:5px;top:14%;right:-2%;background:var(--teal-2);box-shadow:0 0 14px var(--teal-2)}
.s2{width:6px;height:6px;bottom:12%;left:-3%;background:var(--gold);box-shadow:0 0 14px var(--gold);animation-delay:.6s}
.s3{width:3px;height:3px;top:54%;right:-5%;animation-delay:1.2s}
.s4{width:4px;height:4px;top:36%;left:-4%;background:var(--violet);box-shadow:0 0 14px var(--violet);animation-delay:1.7s}
@keyframes tw{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
@media (max-width:900px){
  .hero{height:auto;min-height:100vh}
  .hero-grid{grid-template-columns:1fr;padding:130px var(--pad) 60px}
  .hero-visual{display:none}
  .hero-meta{display:none}
}
</style>
</head>
<body>
<header class="hero" id="top">
  <div class="hero-grid">
    <div class="hero-copy">
      <div class="slogan">From Trauma to Opportunity</div>
      <h1>From <span class="b">Resilience</span> To Global Innovation.</h1>
      <p class="lead">A global hub connecting clinicians, entrepreneurs and strategic partners, turning the hardest human moments into the next generation of breakthroughs.</p>
      <p class="lead">Cutting-edge technologies. Proven methodology. Lasting impact.</p>
      <div class="cta-row">
        <button class="btn-primary" id="missionBtn">Learn About Our Mission →</button>
        <button class="btn-ghost" id="programsBtn">Explore programs</button>
      </div>
    </div>
    <div class="hero-visual">
      <div class="globe-stage" aria-hidden="true">
        <svg class="globe-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
          <defs>
            <radialGradient id="globeBg" cx="36%" cy="30%">
              <stop offset="0%"  stop-color="#00588b" stop-opacity=".48"/>
              <stop offset="55%" stop-color="#0a1c2e" stop-opacity=".30"/>
              <stop offset="100%" stop-color="#051221" stop-opacity=".04"/>
            </radialGradient>
            <radialGradient id="coreGlow" cx="50%" cy="50%">
              <stop offset="0%"  stop-color="#0074b5" stop-opacity=".55"/>
              <stop offset="55%" stop-color="#112c47" stop-opacity=".22"/>
              <stop offset="100%" stop-color="#051221" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="atmo" cx="50%" cy="50%">
              <stop offset="0%"   stop-color="#38B6FF" stop-opacity="0"/>
              <stop offset="88%"  stop-color="#38B6FF" stop-opacity="0"/>
              <stop offset="97%"  stop-color="#A6ECFF" stop-opacity=".10"/>
              <stop offset="100%" stop-color="#A6ECFF" stop-opacity="0"/>
            </radialGradient>
            <clipPath id="globeClip"><circle cx="200" cy="200" r="174"/></clipPath>
          </defs>

          <!-- atmosphere halo (behind sphere) -->
          <circle cx="200" cy="200" r="176" fill="url(#atmo)"/>

          <g clip-path="url(#globeClip)">
            <circle cx="200" cy="200" r="170" fill="url(#globeBg)"/>
            <circle cx="200" cy="190" r="92" fill="url(#coreGlow)"/>
            <image class="globe-logo" href="../../assets/logo.png" x="118" y="98" width="164" height="196" preserveAspectRatio="xMidYMid meet"/>

            <g class="globe-spin">
              <!-- fine wireframe: latitudes + longitudes -->
              <g stroke="rgba(56,182,255,.16)" fill="none" stroke-width="1">
                <ellipse cx="200" cy="200" rx="170" ry="36"/>
                <ellipse cx="200" cy="200" rx="170" ry="72"/>
                <ellipse cx="200" cy="200" rx="170" ry="108"/>
                <ellipse cx="200" cy="200" rx="170" ry="144"/>
                <ellipse cx="200" cy="200" rx="36"  ry="170"/>
                <ellipse cx="200" cy="200" rx="72"  ry="170"/>
                <ellipse cx="200" cy="200" rx="108" ry="170"/>
                <ellipse cx="200" cy="200" rx="144" ry="170"/>
              </g>
              <!-- bright axes (equator + prime meridian) + sphere outline -->
              <g stroke="rgba(56,182,255,.32)" fill="none" stroke-width="1.1">
                <circle cx="200" cy="200" r="170"/>
                <line x1="30" y1="200" x2="370" y2="200"/>
                <line x1="200" y1="30" x2="200" y2="370"/>
              </g>

              <!-- network nodes -->
              <g fill="#38B6FF">
                <circle cx="96"  cy="128" r="2.1"/><circle cx="110" cy="140" r="2.1"/><circle cx="84"  cy="160" r="2.1"/>
                <circle cx="300" cy="124" r="2.1"/><circle cx="320" cy="140" r="2.1"/><circle cx="296" cy="150" r="2.1"/>
                <circle cx="78"  cy="250" r="2.1"/><circle cx="96"  cy="272" r="2.1"/>
                <circle cx="310" cy="250" r="2.1"/><circle cx="320" cy="268" r="2.1"/>
                <circle cx="130" cy="92"  r="2.1"/><circle cx="270" cy="92"  r="2.1"/>
                <circle cx="150" cy="308" r="2.1"/><circle cx="250" cy="308" r="2.1"/>
              </g>
              <g fill="#7BE0FF">
                <circle cx="130" cy="180" r="2.7"/><circle cx="270" cy="180" r="2.7"/>
                <circle cx="130" cy="235" r="2.7"/><circle cx="270" cy="235" r="2.7"/>
              </g>
              <g fill="rgba(56,182,255,.32)">
                <circle cx="60"  cy="200" r="1.4"/><circle cx="340" cy="200" r="1.4"/>
                <circle cx="200" cy="55"  r="1.4"/><circle cx="200" cy="345" r="1.4"/>
                <circle cx="118" cy="118" r="1.4"/><circle cx="282" cy="118" r="1.4"/>
                <circle cx="118" cy="282" r="1.4"/><circle cx="282" cy="282" r="1.4"/>
              </g>
            </g>
          </g>

          <!-- soft atmosphere rim -->
          <circle cx="200" cy="200" r="170" fill="none" stroke="rgba(0,88,139,.26)" stroke-width="1"/>

          <g class="orbit-sat">
            <circle cx="262" cy="150" r="2.4" fill="#A6ECFF"/>
            <circle cx="138" cy="262" r="2" fill="#7be0ff"/>
          </g>
        </svg>
        <span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span><span class="spark s4"></span>
      </div>
    </div>
  </div>

</header>
<script>
document.getElementById('missionBtn').addEventListener('click', () => {
  window.parent.postMessage({t: 'ih:nav', to: 'about/index.html'}, '*');
});
document.getElementById('programsBtn').addEventListener('click', () => {
  window.parent.postMessage({t: 'ih:nav', to: 'programs/index.html'}, '*');
});
</script>
<script src="_bridge.js" data-frame="hero"></script>
</body>
</html>
