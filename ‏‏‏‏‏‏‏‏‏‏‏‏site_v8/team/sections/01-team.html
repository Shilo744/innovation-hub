<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Innovation Hub · Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#051221;--paper-2:#F4F7FA;
  --ink:#FFFFFF;--ink-2:#D6E2EE;--dim:#9AB1C7;--ink-dark:#0D2436;--ink-mid:#3F546A;
  --teal:#0074B5;--teal-2:#38B6FF;--teal-deep:#00588B;--gold:#A6ECFF;
  --line:rgba(180,210,225,.13);--rule:rgba(13,36,54,.10);--pad:6vw;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope','Heebo',system-ui,sans-serif;background:var(--bg-0);color:var(--ink-dark);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
body.fs-lg{font-size:18px}body.fs-xl{font-size:20px}
body.hc{filter:contrast(1.12) saturate(1.15)}
body.ul-links a{text-decoration:underline}
body.reduce-motion *{animation-duration:0s!important;transition-duration:0s!important}
.reveal{opacity:0;transform:translateY(26px) scale(.985);transition:opacity .8s ease, transform .8s cubic-bezier(.16,.84,.28,1)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.1s}
section{position:relative;padding:96px var(--pad)}
.section-head{max-width:1240px;margin:0 auto 56px}
.section-head.center{text-align:center;max-width:820px;margin-left:auto;margin-right:auto}
.section-head.center .right{margin:18px auto 0;font-size:16.5px;line-height:1.7;max-width:600px;color:var(--ink-mid)}

h2.headline{font-family:'Manrope';font-weight:800;font-size:clamp(32px,3.8vw,52px);line-height:1.05;letter-spacing:-.02em}
h2.headline .accent{color:var(--teal-deep)}

.hero-banner{
  background: var(--bg-0);
  color: var(--ink);
  text-align: center;
  padding: 100px var(--pad) 48px;
  position: relative;
  overflow: hidden;
}
.hero-banner h2.headline .accent{color:var(--teal-2)}
.hero-banner .section-head.center .right{color:var(--ink-2)}

.bg-glow{
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 70% 30%, rgba(56,182,255,.08), transparent 50%), radial-gradient(circle at 20% 80%, rgba(123,224,255,.04), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.team-content{
  background: linear-gradient(180deg, var(--paper-2) 0%, #E9EFF4 100%);
  position: relative;
  overflow: hidden;
  padding: 40px var(--pad) 96px;
}
.team-content::before{content:"";position:absolute;top:-120px;left:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle, rgba(0,116,181,.10), transparent 65%);pointer-events:none}
.team-content::after{content:"";position:absolute;bottom:-120px;right:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle, rgba(123,224,255,.08), transparent 65%);pointer-events:none}
.team-tabs{position:relative;z-index:2;display:flex;gap:6px;background:#fff;border:1px solid var(--rule);border-radius:999px;padding:6px;width:fit-content;margin:0 auto 56px;box-shadow:0 10px 24px -14px rgba(13,36,54,.18)}
.team-tab{position:relative;z-index:2;padding:12px 30px;border-radius:999px;background:transparent;color:var(--ink-mid);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:color .25s}
.team-tab.active{color:#fff}
.team-tab:not(.active):hover{color:var(--ink-dark)}
.tab-pill{position:absolute;top:6px;bottom:6px;border-radius:999px;background:var(--ink-dark);transition:left .35s cubic-bezier(.2,.7,.2,1),width .35s cubic-bezier(.2,.7,.2,1);z-index:1;left:6px;width:0}
.team-grid{position:relative;z-index:2;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:36px 20px;max-width:1280px;margin:0 auto}
.person{position:relative;display:flex;flex-direction:column;text-align:center;background:#fff;border:1px solid rgba(13,36,54,.12);border-radius:14px;overflow:hidden;box-shadow:0 10px 24px -18px rgba(13,36,54,.16);transition:transform .35s, border-color .35s, box-shadow .35s}
.person:hover{transform:translateY(-6px);border-color:var(--teal);box-shadow:0 18px 38px -18px rgba(0,116,181,.26)}
.person .photo{position:relative;width:100%;aspect-ratio:1;overflow:hidden;background:#EAF2F8}
.person .pimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 26%}
.person .avatar-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#EAF2F8;color:var(--teal);font-family:'Manrope';font-weight:800;font-size:clamp(30px,4vw,44px);letter-spacing:1px}
.person .meta{padding:14px 12px 16px;display:flex;flex-direction:column;flex:1}
.person .name{font-family:'Manrope';font-weight:800;font-size:16px;letter-spacing:-.012em;color:var(--ink-dark);line-height:1.22}
.person .role{margin-top:5px;font-size:12px;color:var(--ink-mid);font-weight:500;line-height:1.4}
.person .links{margin-top:auto;padding-top:10px;display:flex;justify-content:center;gap:12px}
.person .links a{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;color:var(--teal);transition:background .25s, color .25s}
.person .links a:hover{background:rgba(0,116,181,.10);color:var(--teal-deep)}
.person .links svg{width:16px;height:16px;fill:currentColor;display:block}
@media (max-width:600px){section{padding:80px 6vw}}
</style>
</head>
<body>
<header class="hero-banner">
  <div class="bg-glow"></div>
  <div class="section-head center" style="position:relative; z-index:2;">
    <h2 class="headline reveal">The people behind <span class="accent">the mission</span></h2>
    <div class="right reveal d1">A multidisciplinary team of clinicians, operators, researchers and global experts, each chosen for their proven impact in resilience innovation.</div>
  </div>
</header>
<section class="team-content" id="team">
  <div class="team-tabs" role="tablist">
    <span class="tab-pill" id="tabPill"></span>
    <button class="team-tab active" data-tab="core" role="tab" aria-selected="true">Core Team</button>
    <button class="team-tab" data-tab="board" role="tab" aria-selected="false">Advisory Board</button>
    <button class="team-tab" data-tab="experts" role="tab" aria-selected="false">Experts</button>
  </div>
  <div class="team-grid" id="teamGrid"></div>
</section>

<script>
const TEAM = {
  core:[
    {n:'Moshe Shamy',             r:'Founder',                                          img:'moshe-shamy.jpg'},
    {n:'Eran Segel',              r:'Co-Founder & CEO',                                 img:'eran-segel.jpg'},
    {n:'Boaz Yardeni',            r:'Co-Founder & CTO',                                 img:'boaz-yardeni.jpg'},
    {n:'Igal Bracha',             r:'Innovation Lead | Head of Economic & Employment Development, Sderot Municipality', img:'igal-bracha.jpg'},
    {n:'Prof. Galit Pelled',      r:'CSO',                                              img:'galit-pelled.jpg'},
    {n:'Prof. Itamar Grotto',     r:'CMO',                                              img:'itamar-grotto.jpg'},
    {n:'Dr. Yafa Malada-Edelstein',r:'Lead Meital Program & Head of Health & Education Initiatives', img:'yafa-malada-edelstein.jpg'},
    {n:'Mor Segal',               r:'COO & Startup Community Manager',                  img:'mor-segal.jpg'},
    {n:'Shoval Azulay',           r:'Marketing & PR Lead',                              img:'shoval-azulay.jpg'},
    {n:'Dudu Hazan',              r:'CFO',                                              img:'dudu-hazan.jpg'},
    {n:'Yaniv Moshe',             r:'Business Development & Tech Project Manager, Sderot Municipality', img:'yaniv-moshe.jpg'},
    {n:'Shirai Kahlon',           r:'Team Member',                                      img:'shirai-kahlon.jpg'},
    {n:'Gal Samay Levi',          r:'Deputy Director & Head of Ecosystem Training & Human Capital, Sderot Municipality', img:'gal-samay-levi.jpg'},
    {n:'Ayelet Shmuel',           r:'Director, International Resilience Institute Sderot', img:'ayelet-shmuel-homepage.jpg'},
  ],
  board:[
    {n:'Avner Halperin',          r:'CEO of Sheba Impact',                              img:'avner-halperin.jpg'},
    {n:'Yonit Serkin',            r:'Chief Business Officer, embARC Ventures',          img:'yonit-serkin.jpg'},
    {n:'Dr. Alona Brnea',         r:'Head of Neurotechnology, DDR&D Mafat',             img:'alona-brnea.jpg'},
    {n:'Yarden Abarbanel',        r:'Program Director, Support the Soul, Teva',         img:'yarden-abarbanel.avif'},
    {n:'Nurit Horvitz Amit',      r:'Deputy Director, Disability Services Fund, NII',   img:'nurit-horvitz-amit.jpg'},
    {n:'Sigal Admony',            r:'Global Digital HealthTech Executive',              img:'sigal-admony.jpg'},
    {n:'Prof. Ehud Schwammenthal',r:'Cardiologist & MedTech Entrepreneur',             img:'ehud-schwammenthal.jpeg'},
    {n:'Guy Meger',               r:'Senior Executive, MedTech',                        img:'guy-meger.jpg'},
    {n:'Ayelet Shmuel',           r:'Director, International Resilience Institute Sderot', img:'ayelet-shmuel.jpg'},
    {n:'Adiel Am-Shalom',         r:'Founder of IDL; Co-Founder & CEO of AISAP',        img:'adiel-am-shalom.jpg'},
    {n:'Michael Boaz Simantov',   r:'CEO, The Sderot Foundation',                       img:'michael-boaz-simantov.jpg'},
    {n:'Oz Jacob',                r:'Deputy CEO, Binat Group',                          img:'oz-jacob.jpg'},
    {n:'Dr. Moshe Farchi',        r:'Head, Stress & Resilience Program, Tel-Hai',       img:'moshe-farchi.webp'},
    {n:'Dr. Dan Shaham',          r:'Founder, JADDE',                                   img:'dan-shaham.jpg'},
    {n:'Sagit Palatin Yifrach',   r:'Head of Employment & Entrepreneurship, Sapir',     img:'sagit-palatin-yifrach.jpeg'},
    {n:'David Gabay',             r:'CEO of Hamitbah; High-Tech Entrepreneur',          img:'david-gabay.jpg'},
    {n:'Shay Chen',               r:'Technology & Strategy Consultant',                 img:'shay-chen.jpg'},
    {n:'Netanel Amar',            r:'Co-Founder at Cynet; Director, Meital Program',    img:'netanel-amar.jpg'},
    {n:'Ran Benyamin',            r:'Growth & Innovation Strategist',                   img:'ran-benyamin.jpg'},
    {n:'Sami Turgeman',           r:'Ex-Southern Command Chief; Chairman, Noga',        img:'sami-turgeman.jpg'},
    {n:'Hanan Gefen',             r:'Former Commander Unit 8200; Founder, Meital',      img:'hanan-gefen.jpeg'},
    {n:'Hila Gonen-Brazilay',     r:'Director, Sderot Resilience Center',               img:'hila-gonen-brazilay.jpg'},
  ],
  experts:[
    {n:'Dr. Asi Sikurel',         r:'Innovation Manager, Clalit (Southern District)',   img:'asi-sikurel.jpg'},
    {n:'Dr. Dalia Admon',         r:'OB-GYN Specialist',                                img:'dalia-admon.jpg'},
    {n:'Dr. Michal Ganz-Meishar', r:'Education Consultant',                             img:'michal-ganz-meishar.jpg'},
    {n:'Dr. Shir Fridman',        r:'Cardiology Fellow, Tel Aviv Medical Center',       img:'shir-fridman.jpg'},
    {n:'Dorit Cohen Carmon',      r:'Strategy & Innovation Advisor, Health & Biotech',  img:'dorit-cohen-carmon.jpg'},
    {n:'Israel Ben Shitrit',      r:'Investment & Business Development Specialist',      img:'israel-ben-shitrit.jpg'},
    {n:'Irit Segal',              r:'Clinical Director, Sderot Resilience Center',      img:'irit-segal.jpg'},
    {n:'Dr. Ayala Kobo-Greenhut', r:'R&D in Complex Innovative Technologies',           img:'ayala-kobo-greenhut.jpg'},
  ],
};
(function(){
  const grid=document.getElementById('teamGrid');
  const FALLBACK_MAIL='mailto:Rh.innovationhub@gmail.com';
  const FALLBACK_LINKEDIN='https://il.linkedin.com/company/resilience-health-innovation-hub';
  const ICON_MAIL='<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>';
  const ICON_LINKEDIN='<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>';
  const esc=s=>s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  const initials=n=>n.replace(/^(?:Dr\.|Prof\.)\s*/i,'').trim().split(/\s+/).map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
  function render(key){
    grid.innerHTML=TEAM[key].map(p=>{
      const mail=p.email?('mailto:'+p.email):FALLBACK_MAIL;
      const linkedin=p.linkedin||FALLBACK_LINKEDIN;
      return `
        <article class="person" style="opacity:0;transform:translateY(20px)">
          <div class="photo">
            <div class="avatar-fallback" aria-hidden="true">${esc(initials(p.n))}</div>
            <img class="pimg" src="../../assets/team/${p.img}" alt="${esc(p.n)}" loading="lazy" onerror="this.remove()"/>
          </div>
          <div class="meta">
            <div class="name">${esc(p.n)}</div>
            <div class="role">${esc(p.r)}</div>
            <div class="links">
              <a href="${esc(mail)}" aria-label="Email ${esc(p.n)}">${ICON_MAIL}</a>
              <a href="${esc(linkedin)}" target="_blank" rel="noopener" aria-label="LinkedIn profile of ${esc(p.n)}">${ICON_LINKEDIN}</a>
            </div>
          </div>
        </article>`;
    }).join('');
    requestAnimationFrame(()=>{
      grid.querySelectorAll('.person').forEach((el,i)=>{
        setTimeout(()=>{
          el.style.opacity=1;el.style.transform='translateY(0)';
          el.style.transition='opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1), border-color .35s, box-shadow .35s';
          if(window.__frameReport) window.__frameReport();
        },i*30);
      });
    });
  }
  function positionPill(){
    const active=document.querySelector('.team-tab.active');
    const pill=document.getElementById('tabPill');
    if(active&&pill){pill.style.left=active.offsetLeft+'px';pill.style.width=active.offsetWidth+'px';}
  }
  document.querySelectorAll('.team-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.team-tab').forEach(x=>{x.classList.remove('active');x.setAttribute('aria-selected','false')});
    t.classList.add('active');t.setAttribute('aria-selected','true');
    positionPill();render(t.dataset.tab);
  }));
  render('core');
  requestAnimationFrame(positionPill);
  addEventListener('resize',positionPill);
})();
</script>
<script src="_bridge.js" data-frame="team"></script>
</body>
</html>
